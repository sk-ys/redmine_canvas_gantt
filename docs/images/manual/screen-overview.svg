<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Canvas Gantt screen overview</title>
  <desc id="desc">Illustration of the Canvas Gantt screen areas for the manual.</desc>
  <defs>
    <style>
      .bg { fill: #f6f1e8; }
      .panel { fill: #ffffff; stroke: #202020; stroke-width: 2; }
      .toolbar { fill: #ece6d8; stroke: #202020; stroke-width: 2; }
      .sidebar { fill: #faf7f0; stroke: #202020; stroke-width: 2; }
      .timeline { fill: #fdfdfd; stroke: #202020; stroke-width: 2; }
      .group { fill: #dfe9f4; stroke: #202020; stroke-width: 1.5; }
      .note { fill: #1e3a5f; }
      .label { fill: #101010; font-family: Arial, sans-serif; font-size: 22px; font-weight: 700; }
      .small { fill: #2a2a2a; font-family: Arial, sans-serif; font-size: 17px; }
      .num { fill: #ffffff; font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1280" height="760" rx="24"/>
