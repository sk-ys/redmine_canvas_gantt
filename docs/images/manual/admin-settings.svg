<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Admin settings overview</title>
  <desc id="desc">Illustration of the Canvas Gantt plugin settings in Redmine administration.</desc>
  <defs>
    <style>
      .bg { fill: #f7f3eb; }
      .panel { fill: #ffffff; stroke: #202020; stroke-width: 2; }
      .head { fill: #e5ded0; stroke: #202020; stroke-width: 2; }
      .line { fill: #f7f5ef; stroke: #d6d0c2; stroke-width: 1; }
      .text { fill: #151515; font-family: Arial, sans-serif; font-size: 18px; }
      .title { fill: #151515; font-family: Arial, sans-serif; font-size: 26px; font-weight: 700; }
      .small { fill: #4a4a4a; font-family: Arial, sans-serif; font-size: 15px; }
      .check { stroke: #202020; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .number { fill: #1e3a5f; }
      .numtext { fill: #ffffff; font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="620" rx="24"/>
  <rect class="head" x="56" y="40" width="1088" height="72" rx="16"/>
  <text class="title" x="88" y="85">Canvas Gantt - Inline Quick Edit (Level 2+)</text>

  <rect class="panel" x="56" y="132" width="1088" height="428" rx="18"/>

  <g transform="translate(90 174)">
    <g transform="translate(0 0)">
      <rect class="line" width="1000" height="42" rx="8"/>
      <rect x="18" y="10" width="22" height="22" rx="4" fill="#ffffff" stroke="#202020" stroke-width="2"/>
      <path class="check" d="M22 22 28 28 38 14"/>
      <text class="text" x="62" y="27">subject</text>
      <text class="small" x="390" y="27">件名のインライン編集を許可</text>
    </g>
    <g transform="translate(0 56)">
      <rect class="line" width="1000" height="42" rx="8"/>
      <rect x="18" y="10" width="22" height="22" rx="4" fill="#ffffff" stroke="#202020" stroke-width="2"/>
      <path class="check" d="M22 22 28 28 38 14"/>
      <text class="text" x="62" y="27">assigned_to</text>
      <text class="small" x="390" y="27">担当者のインライン編集を許可</text>
    </g>
    <g transform="translate(0 112)">
      <rect class="line" width="1000" height="42" rx="8"/>
      <rect x="18" y="10" width="22" height="22" rx="4" fill="#ffffff" stroke="#202020" stroke-width="2"/>
      <path class="check" d="M22 22 28 28 38 14"/>
      <text class="text" x="62" y="27">status</text>
      <text class="small" x="390" y="27">ステータスのインライン編集を許可</text>
    </g>
    <g transform="translate(0 168)">
      <rect class="line" width="1000" height="42" rx="8"/>
      <rect x="18" y="10" width="22" height="22" rx="4" fill="#ffffff" stroke="#202020" stroke-width="2"/>
      <path class="check" d="M22 22 28 28 38 14"/>
      <text class="text" x="62" y="27">done_ratio</text>
      <text class="small" x="390" y="27">進捗率のインライン編集を許可</text>
    </g>
    <g transform="translate(0 224)">
      <rect class="line" width="1000" height="42" rx="8"/>
      <rect x="18" y="10" width="22" height="22" rx="4" fill="#ffffff" stroke="#202020" stroke-width="2"/>
      <path class="check" d="M22 22 28 28 38 14"/>
      <text class="text" x="62" y="27">due_date</text>
      <text class="small" x="390" y="27">期日のインライン編集を許可</text>
    </g>
    <g transform="translate(0 280)">
      <rect class="line" width="1000" height="42" rx="8"/>
      <rect x="18" y="10" width="22" height="22" rx="4" fill="#ffffff" stroke="#202020" stroke-width="2"/>
      <path class="check" d="M22 22 28 28 38 14"/>
      <text class="text" x="62" y="27">custom_fields</text>
      <text class="small" x="390" y="27">カスタムフィールドのインライン編集を許可</text>
    </g>
    <g transform="translate(0 336)">
      <rect class="line" width="1000" height="42" rx="8"/>
      <text class="text" x="18" y="27">row_height</text>
      <rect x="184" y="8" width="120" height="28" rx="6" fill="#ffffff" stroke="#202020" stroke-width="2"/>
      <text class="small" x="200" y="27">36</text>
      <text class="small" x="390" y="27">既定の行高</text>
    </g>
  </g>

  <circle class="number" cx="104" cy="86" r="20"/><text class="numtext" x="104" y="86">1</text>
  <circle class="number" cx="104" cy="192" r="20"/><text class="numtext" x="104" y="192">2</text>
  <circle class="number" cx="104" cy="514" r="20"/><text class="numtext" x="104" y="514">3</text>

  <text class="small" x="136" y="92">プラグイン設定の見出し</text>
  <text class="small" x="136" y="198">編集可否を切り替えるチェック項目</text>
  <text class="small" x="136" y="520">既定の行高を入力する欄</text>
</svg>
